<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>MeowUI Design System</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color — matches brand-500 (#0AA4B8) -->
    <meta name="theme-color" content="#0AA4B8" />

    <!-- Description (for SEO & PWA) -->
    <meta name="description" content="MeowUI — Mobile-first design system showcase for Shaadi.com. Components, icons, animations & screens." />

    <!-- Favicon -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeowUI" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- MS Tile -->
    <meta name="msapplication-TileColor" content="#0AA4B8" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Figma HTML→Design capture (load on localhost when using #figmacapture=… hash) -->
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
